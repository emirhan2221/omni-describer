name: CI

# Lightweight smoke check: byte-compile everything and import core modules.
# No test suite exists yet (see AGENTS.md); this catches syntax and import breaks.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Byte-compile all sources
        run: python -m compileall -q audio_describer run_app.py sapi32.py updater.py

      - name: Import config (no heavy deps)
        run: python -c "import audio_describer.config; print(audio_describer.config.APP_VERSION)"
